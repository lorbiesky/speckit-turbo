schema_version: "1.0"

bundle:
  id: speckit-turbo
  name: "Spec Kit Turbo"
  version: "2.0.4"
  role: "developer"
  description: "A native Spec Kit extension and workflows for auditable SDD, configurable TDD, visual specs, and Socratic constitution updates."
  author: "lorbiesky"
  license: "MIT"

requires:
  speckit_version: ">=0.11.4"
  tools: []
  mcp: []

provides:
  extensions:
    - id: turbo
      version: "2.0.4"
  workflows:
    - { id: turbo-feature, version: "2.0.4" }
    - { id: turbo-bugfix, version: "2.0.4" }
    - { id: turbo-refactor, version: "2.0.4" }
    - { id: turbo-maintenance, version: "2.0.4" }
    - { id: turbo-hotfix, version: "2.0.4" }
    - { id: turbo-discovery, version: "2.0.4" }
    - { id: turbo-constitution, version: "2.0.4" }

tags: ["sdd", "tdd", "visual-specification", "governance"]
