name: maintenance
version: 1
classification: maintenance
state_file: .specify/turbo/state.json

phases:
  - id: intake
    owner: turbo-orchestrator
    provides: [maintenance_scope_recorded]
    gate:
      require: [maintenance_need_recorded, scope_and_impact_recorded, project_profile_loaded]
    on_blocked: pause_and_record

  - id: plan
    owner: turbo-architect
    provides: [maintenance_plan_ready]
    preconditions: [maintenance_scope_recorded]
    invokes: [speckit-plan, speckit-tasks]
    outputs: [plan.md, tasks.md]
    gate:
      require: [safe_change_plan_defined, validation_strategy_defined, rollback_considered]
    on_blocked: pause_and_record

  - id: implementation
    owner: turbo-implementation-specialist
    provides: [implementation_ready]
    preconditions: [maintenance_plan_ready]
    invokes: [speckit-implement]
    gate:
      require: [planned_maintenance_completed, unrelated_changes_excluded, deviations_recorded]
    on_blocked: pause_and_record

  - id: validation
    owner: turbo-test-engineer
    provides: [validation_ready]
    preconditions: [implementation_ready]
    gate:
      require: [configured_quality_gates_executed, intended_operational_result_verified, failures_explained_or_resolved]
    on_blocked: pause_and_record

  - id: review
    owner: turbo-code-reviewer
    provides: [review_ready]
    preconditions: [validation_ready]
    human_checkpoint: when_configured
    gate:
      require: [scope_compliance_reviewed, regression_risk_reviewed, blocking_findings_resolved]
    on_blocked: pause_and_record

  - id: delivery
    owner: turbo-orchestrator
    preconditions: [review_ready]
    outputs: [delivery-summary.md]
    gate:
      require: [maintenance_summary_recorded, validation_evidence_recorded, followups_recorded]
    on_blocked: pause_and_record
