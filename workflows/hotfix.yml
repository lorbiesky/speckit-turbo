name: hotfix
version: 1
classification: hotfix
state_file: .specify/turbo/state.json

phases:
  - id: intake
    owner: turbo-orchestrator
    provides: [hotfix_intake_complete]
    gate:
      require: [production_impact_recorded, urgency_justified, project_profile_loaded]
    on_blocked: pause_and_record

  - id: containment
    owner: turbo-implementation-specialist
    provides: [containment_complete]
    preconditions: [hotfix_intake_complete]
    outputs: [bug-evidence.md]
    gate:
      require: [observable_failure_or_risk_recorded, containment_or_reason_recorded, rollback_path_known]
    on_blocked: pause_and_record

  - id: tdd-preparation
    owner: turbo-tdd-coach
    provides: [tdd_cycle_ready]
    satisfies_on_skip: true
    condition: tdd_enabled
    preconditions: [containment_complete]
    outputs: [.specify/turbo/tdd-cycle.md, .specify/turbo/state.json]
    gate:
      require: [test_strategy_defined, red_test_evidence_recorded]
    on_blocked: pause_and_record

  - id: correction
    owner: turbo-implementation-specialist
    provides: [implementation_ready]
    invokes: [speckit-implement]
    preconditions: [containment_complete, tdd_cycle_ready]
    gate:
      require: [smallest_safe_fix_applied, root_cause_hypothesis_recorded, unrelated_changes_excluded]
      require_when:
        tdd_enabled: [green_cycle_evidence_recorded, refactor_evidence_recorded]
    on_blocked: pause_and_record

  - id: validation
    owner: turbo-test-engineer
    provides: [validation_ready]
    preconditions: [implementation_ready]
    gate:
      require: [production_risk_rechecked, targeted_regression_evidence_recorded, configured_quality_gates_executed_or_justified]
    on_blocked: pause_and_record

  - id: review
    owner: turbo-code-reviewer
    provides: [review_ready]
    preconditions: [validation_ready]
    human_checkpoint: when_configured
    gate:
      require: [hotfix_scope_reviewed, residual_risk_recorded, blocking_findings_resolved]
    on_blocked: pause_and_record

  - id: delivery
    owner: turbo-orchestrator
    preconditions: [review_ready]
    outputs: [delivery-summary.md]
    gate:
      require: [incident_and_fix_summarized, validation_evidence_recorded, followups_recorded]
    on_blocked: pause_and_record
