name: refactor
version: 1
classification: refactor
state_file: .specify/turbo/state.json

phases:
  - id: intake
    owner: turbo-orchestrator
    provides:
      - project_profile_loaded
      - refactor_intake_complete
    gate:
      require:
        - motivation_recorded
        - behavioral_invariants_declared
        - project_profile_loaded
    on_blocked: pause_and_record

  - id: architecture-analysis
    owner: turbo-architect
    provides:
      - architecture_analysis_complete
    preconditions:
      - refactor_intake_complete
    outputs:
      - refactor-analysis.md
    on_blocked: pause_and_record
    gate:
      require:
        - current_structure_evidenced
        - target_boundaries_defined
        - migration_risks_recorded
        - behavior_change_excluded_or_reclassified

  - id: regression-baseline
    owner: turbo-test-engineer
    provides:
      - regression_baseline_ready
    preconditions:
      - architecture_analysis_complete
    on_blocked: pause_and_record
    gate:
      require:
        - critical_invariants_have_coverage
        - missing_coverage_risk_recorded
        - baseline_validation_executed

  - id: transformation-plan
    owner: turbo-architect
    provides:
      - transformation_plan_ready
    preconditions:
      - regression_baseline_ready
    invokes:
      - speckit-plan
      - speckit-tasks
      - speckit-analyze
    outputs:
      - plan.md
      - tasks.md
    on_blocked: pause_and_record
    gate:
      require:
        - incremental_steps_defined
        - intermediate_states_buildable
        - rollback_points_identified
        - task_order_and_dependencies_explicit

  - id: tdd-preparation
    owner: turbo-tdd-coach
    provides: [tdd_cycle_ready]
    satisfies_on_skip: true
    condition: tdd_enabled
    preconditions: [transformation_plan_ready]
    outputs: [.specify/turbo/tdd-cycle.md, .specify/turbo/state.json]
    gate:
      require: [test_strategy_defined, red_test_evidence_recorded]
    on_blocked: pause_and_record

  - id: implementation
    owner: turbo-implementation-specialist
    provides:
      - implementation_ready
    preconditions:
      - transformation_plan_ready
      - tdd_cycle_ready
    invokes:
      - speckit-implement
    on_blocked: pause_and_record
    gate:
      require:
        - invariants_preserved_per_increment
        - unrelated_cleanup_excluded
        - deviations_recorded
      require_when:
        tdd_enabled:
          - green_cycle_evidence_recorded
          - refactor_evidence_recorded

  - id: validation
    owner: turbo-test-engineer
    provides:
      - validation_ready
    preconditions:
      - implementation_ready
    on_blocked: pause_and_record
    gate:
      require:
        - baseline_and_final_results_compared
        - configured_quality_gates_executed
        - performance_or_bundle_impact_checked_when_relevant

  - id: review
    owner: turbo-code-reviewer
    provides:
      - review_ready
    preconditions:
      - validation_ready
    on_blocked: pause_and_record
    gate:
      require:
        - structural_goal_achieved
        - behavior_preservation_reviewed
        - complexity_not_displaced
        - blocking_findings_resolved

  - id: delivery
    owner: turbo-orchestrator
    preconditions:
      - review_ready
    outputs:
      - delivery-summary.md
    gate:
      require:
        - before_after_summary_recorded
        - validation_evidence_recorded
        - deferred_cleanup_recorded
    on_blocked: pause_and_record
