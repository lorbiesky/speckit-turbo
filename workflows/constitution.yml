name: constitution
version: 1
classification: constitution
state_file: .specify/turbo/state.json

phases:
  - id: diagnosis
    owner: turbo-constitution-facilitator
    provides:
      - diagnosis_complete
    outputs:
      - .specify/memory/constitution-interview.md
    gate:
      require:
        - repository_and_configuration_analyzed
        - create_or_update_mode_recorded
        - theme_applicability_recorded
    on_blocked: pause_and_record

  - id: socratic-interview
    owner: turbo-constitution-facilitator
    provides:
      - interview_complete
    outputs:
      - .specify/memory/constitution-interview.md
      - .specify/turbo/state.json
    preconditions:
      - diagnosis_complete
    gate:
      require:
        - one_question_at_a_time
        - applicable_themes_covered
        - blocking_questions_resolved
        - answers_and_decisions_persisted
    human_checkpoint: when_configured
    on_blocked: pause_and_record

  - id: consistency-analysis
    owner: turbo-constitution-facilitator
    provides:
      - consistency_analysis_passed
    preconditions:
      - interview_complete
    invokes:
      - speckit-analyze
    gate:
      require:
        - principles_have_rationale
        - principles_have_observable_practice
        - principles_have_validation_criterion
        - critical_contradictions_resolved
    on_blocked: pause_and_record

  - id: draft
    owner: turbo-constitution-facilitator
    provides:
      - draft_ready
    invokes:
      - speckit-constitution
    outputs:
      - .specify/memory/constitution.draft.md
    preconditions:
      - interview_complete
      - consistency_analysis_passed
    gate:
      require:
        - draft_exists
        - final_constitution_unchanged
        - draft_traceable_to_interview
    on_blocked: pause_and_record

  - id: approval
    owner: turbo-constitution-facilitator
    provides:
      - approval_passed
    preconditions:
      - draft_ready
    gate:
      require:
        - human_approval_recorded
        - approval_targets_current_draft
    human_checkpoint: always
    on_blocked: pause_and_record

  - id: finalize
    owner: turbo-constitution-facilitator
    provides:
      - constitution_finalized
    outputs:
      - .specify/memory/constitution.md
    preconditions:
      - approval_passed
    gate:
      require:
        - constitution_updated_after_approval
        - interview_persisted
        - final_constitution_validated
    on_blocked: pause_and_record

  - id: validation
    owner: turbo-test-engineer
    preconditions:
      - constitution_finalized
    gate:
      require:
        - required_principle_sections_present
        - final_file_matches_approved_draft
        - no_blocking_interview_questions
    on_blocked: pause_and_record
