name: feature
version: 1
classification: feature
state_file: .specify/turbo/state.json

phases:
  - id: intake
    owner: turbo-orchestrator
    provides:
      - project_profile_loaded
      - classified_as_feature
      - scope_recorded
    outputs:
      - .specify/turbo/state.json
    on_blocked: pause_and_record
    gate:
      require:
        - classified_as_feature
        - scope_recorded
        - project_profile_loaded

  - id: visual-analysis
    owner: turbo-visual-specifier
    provides:
      - visual_analysis_completed
    outputs:
      - visual-spec.md
      - .specify/turbo/state.json
    condition: visual_input_present
    gate:
      require:
        - images_identified
        - visual_evidence_classified
        - component_inventory_recorded
        - visual_acceptance_criteria_generated
        - persistence_protection_verified_or_not_required
    human_checkpoint: when_configured
    on_blocked: pause_and_record

  - id: product-specification
    owner: turbo-product-owner
    provides:
      - product_specification_ready
    invokes:
      - speckit-specify
      - speckit-clarify
    outputs:
      - clarifications.md
      - spec.md
    condition: visual_input_absent_or_completed
    preconditions:
      - project_profile_loaded
    on_blocked: pause_and_record
    gate:
      require:
        - problem_and_outcome_defined
        - testable_acceptance_criteria
        - blocking_questions_resolved
        - out_of_scope_declared
      human_checkpoint: when_configured

  - id: technical-plan
    owner: turbo-architect
    provides:
      - technical_plan_ready
    invokes:
      - speckit-plan
    outputs:
      - plan.md
      - research.md
      - data-model.md
      - contracts/
    preconditions:
      - product_specification_ready
    on_blocked: pause_and_record
    gate:
      require:
        - repository_evidence_cited
        - architecture_and_boundaries_defined
        - risks_and_mitigations_recorded
        - test_strategy_defined
      human_checkpoint: when_configured

  - id: task-decomposition
    owner: turbo-orchestrator
    provides:
      - tasks_ready
    invokes:
      - speckit-tasks
      - speckit-analyze
    outputs:
      - tasks.md
    preconditions:
      - technical_plan_ready
    on_blocked: pause_and_record
    gate:
      require:
        - every_acceptance_criterion_covered
        - dependencies_explicit
        - parallel_work_marked
        - no_unresolved_spec_plan_conflicts

  - id: tdd-preparation
    owner: turbo-tdd-coach
    provides:
      - tdd_cycle_ready
    satisfies_on_skip: true
    condition: tdd_enabled
    preconditions:
      - tasks_ready
    outputs:
      - .specify/turbo/tdd-cycle.md
      - .specify/turbo/state.json
    on_blocked: pause_and_record
    gate:
      require:
        - test_strategy_defined
        - red_test_evidence_recorded

  - id: implementation
    owner: turbo-implementation-specialist
    provides:
      - implementation_ready
    invokes:
      - speckit-implement
    preconditions:
      - tasks_ready
      - tdd_cycle_ready
    on_blocked: pause_and_record
    gate:
      require:
        - implementation_matches_tasks
        - deviations_recorded
        - repository_rules_followed
      require_when:
        tdd_enabled:
          - green_cycle_evidence_recorded
          - refactor_evidence_recorded

  - id: validation
    owner: turbo-test-engineer
    provides:
      - validation_ready
    preconditions:
      - implementation_ready
    on_blocked: pause_and_record
    gate:
      require:
        - configured_quality_gates_executed
        - acceptance_criteria_have_evidence
        - failures_explained_or_resolved

  - id: review
    owner: turbo-code-reviewer
    provides:
      - review_ready
    preconditions:
      - validation_ready
    on_blocked: pause_and_record
    gate:
      require:
        - specification_compliance_reviewed
        - regression_risk_reviewed
        - blocking_findings_resolved

  - id: delivery
    owner: turbo-orchestrator
    preconditions:
      - review_ready
    outputs:
      - delivery-summary.md
    gate:
      require:
        - state_completed
        - validations_summarized
        - risks_and_followups_recorded
    on_blocked: pause_and_record
