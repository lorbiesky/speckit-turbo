name: bugfix
version: 1
classification: bugfix
state_file: .specify/turbo/state.json

phases:
  - id: intake
    owner: turbo-orchestrator
    provides:
      - project_profile_loaded
      - bugfix_intake_complete
    gate:
      require:
        - observable_failure_recorded
        - impact_and_urgency_recorded
        - project_profile_loaded
    on_blocked: pause_and_record

  - id: reproduction
    owner: turbo-implementation-specialist
    provides:
      - reproduction_complete
    outputs:
      - bug-evidence.md
    on_blocked: pause_and_record
    gate:
      require:
        - reproduction_steps_or_reason_unavailable
        - expected_and_actual_behavior
        - affected_versions_or_context

  - id: root-cause
    owner: turbo-architect
    provides:
      - root_cause_complete
    outputs:
      - root-cause.md
    on_blocked: pause_and_record
    gate:
      require:
        - evidence_based_cause
        - affected_boundary_identified
        - competing_hypotheses_addressed

  - id: correction-plan
    owner: turbo-architect
    provides:
      - correction_plan_ready
    invokes:
      - speckit-plan
    outputs:
      - plan.md
    on_blocked: pause_and_record
    gate:
      require:
        - smallest_safe_change_defined
        - regression_test_defined
        - rollback_or_recovery_considered

  - id: implementation
    owner: turbo-implementation-specialist
    provides:
      - implementation_ready
    preconditions:
      - root_cause_complete
      - correction_plan_ready
    invokes:
      - speckit-tasks
      - speckit-implement
    on_blocked: pause_and_record
    gate:
      require:
        - root_cause_addressed
        - unrelated_changes_excluded
        - regression_coverage_added

  - id: validation
    owner: turbo-test-engineer
    provides:
      - validation_ready
    preconditions:
      - implementation_ready
    on_blocked: pause_and_record
    gate:
      require:
        - original_failure_no_longer_reproduces
        - regression_test_passes
        - surrounding_behavior_checked
        - configured_quality_gates_executed

  - id: review
    owner: turbo-code-reviewer
    provides:
      - review_ready
    preconditions:
      - validation_ready
    on_blocked: pause_and_record
    gate:
      require:
        - fix_matches_root_cause
        - regression_risk_reviewed
        - blocking_findings_resolved

  - id: delivery
    owner: turbo-orchestrator
    preconditions:
      - review_ready
    outputs:
      - delivery-summary.md
    gate:
      require:
        - root_cause_and_fix_summarized
        - validation_evidence_recorded
        - followups_recorded
    on_blocked: pause_and_record
