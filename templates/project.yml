project:
  name: change-me
  type: other
  stack: generic

specKit:
  version: replace-with-spec-kit-version
  integration: codex

constitution:
  enabled: true
  require_human_approval: true
  themes:
    - engineering_principles
    - quality_testing
    - architecture
    - security_privacy
    - documentation
    - collaboration
    - governance

tdd:
  enabled: true
  allow_exception: true
  require_human_approval_for_exception: true

visual:
  enabled: true
  persist_references: false
  references_path: .specify/visual-references
  require_visual_acceptance: true
  visual_regression: false

workflow:
  require_clarification: true
  require_plan_approval: true
  require_tests: true
  require_final_review: true
  # Phases that require explicit approval. Empty keeps autonomous progress between mandatory gates.
  human_checkpoints: []

quality:
  lint: true
  unit_tests: true
  build: true
  accessibility: false
  security_review: true

commands:
  install: replace-with-project-install-command
  lint: replace-with-project-lint-command
  test: replace-with-project-test-command
  build: replace-with-project-build-command

documentation:
  update_readme_when_needed: true
  create_adr_for_architecture_decisions: true
