name: Release native Spec Kit Turbo assets

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to update"
        required: true
        default: "v2.0.1"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Validate release contract
        run: python scripts/validate.py
      - name: Create release archives
        run: |
          mkdir -p dist
          version="$(tr -d '\n' < VERSION)"
          git archive --format=zip HEAD extension.yml turbo-config.yml commands templates scripts > "dist/speckit-turbo-extension-${version}.zip"
          for workflow in workflows/*; do
            id="$(basename "$workflow")"
            git archive --format=zip HEAD "$workflow" > "dist/${id}-${version}.zip"
          done
          git archive --format=zip HEAD bundle.yml VERSION > "dist/speckit-turbo-bundle-${version}.zip"
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: dist/*.zip
