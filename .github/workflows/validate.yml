name: Validate native Spec Kit Turbo

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install repository validation dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Validate native component contracts
        run: python scripts/validate.py
      - name: Run contract tests
        run: python -m unittest discover -s tests -v
      - name: Set up uv and current Spec Kit
        uses: astral-sh/setup-uv@v6
      - name: Validate native installation with Spec Kit
        run: |
          uv tool install --from git+https://github.com/github/spec-kit.git specify-cli
          project="$(mktemp -d)"
          cd "$project"
          specify init --here --integration codex --ignore-agent-tools
          specify extension add --dev "$GITHUB_WORKSPACE"
          for workflow in "$GITHUB_WORKSPACE"/workflows/*; do
            specify workflow add --dev "$workflow"
          done
          specify extension list | grep -q 'turbo'
          [ "$(specify workflow list | grep -c '^  Turbo ')" -eq 7 ]
      - name: Check whitespace
        run: git show --check --format= HEAD
